name: Build Loader

on:
  push:
    branches: [master]
  workflow_dispatch: {}

# Needed for vcpkg's GitHub Actions binary cache (x-gha backend).
permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 180

    env:
      # NOTE: do not declare VCPKG_ROOT here. The windows-2022 runner
      # ships VS Enterprise which pre-sets a system-wide VCPKG_ROOT
      # pointing at its own (empty) vcpkg dir, and that pre-set value
      # wins over a job-level env in PowerShell expansions. We export
      # the right VCPKG_ROOT into $GITHUB_ENV inside the clone step
      # so every later step sees our copy.
      #
      # We rely on actions/cache for the installed Qt artifacts; the
      # vcpkg x-gha backend depends on the v1 GitHub Actions cache API
      # which has been deprecated, and a fresh runner image often does
      # not have ACTIONS_RESULTS_URL set for non-Node actions yet.
      # Setting "files" as the binary source means vcpkg will still
      # populate ${VCPKG_ROOT}/archives, which actions/cache then
      # snapshots along with installed/.
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}\\vcpkg-archives,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve git revision
        id: rev
        shell: pwsh
        run: |
          $sha = git rev-parse --short=7 HEAD
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Build revision: $sha"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone & bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkg = Join-Path $env:GITHUB_WORKSPACE 'vcpkg'
          if (Test-Path $vcpkg) {
              Write-Host "Reusing existing $vcpkg"
          } else {
              git clone --depth=1 https://github.com/microsoft/vcpkg.git $vcpkg
          }
          & "$vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          & "$vcpkg\vcpkg.exe" version
          "VCPKG_ROOT=$vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Exported VCPKG_ROOT=$vcpkg to GITHUB_ENV"

      # Cache the resolved Qt install + the file-backed binary archive.
      # Key is keyed on vcpkg.json so any dependency change invalidates;
      # restore-keys lets a vcpkg.json bump still warm-start from the
      # previous build's archives. installed/ alone makes CMake's manifest
      # mode skip rebuilding qtbase; archives/ also fills back transitive
      # deps if a partial rebuild is needed.
      - name: Cache vcpkg installed + archives
        uses: actions/cache@v4
        with:
          path: |
            vcpkg\installed
            vcpkg-archives
          key: vcpkg-qt-${{ runner.os }}-${{ hashFiles('native/vcpkg.json') }}
          restore-keys: |
            vcpkg-qt-${{ runner.os }}-

      - name: Install UPX
        shell: pwsh
        run: choco install upx -y --no-progress

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build (clean dll upxCompress)
        shell: pwsh
        env:
          OPENZEN_BUILD_REVISION: ${{ steps.rev.outputs.sha }}
        run: |
          Write-Host "VCPKG_ROOT       = $env:VCPKG_ROOT"
          Write-Host "JAVA_HOME        = $env:JAVA_HOME"
          Write-Host "OPENZEN_BUILD_REV = $env:OPENZEN_BUILD_REVISION"
          .\gradlew.bat --no-daemon clean dll upxCompress

      - name: Show artifact info
        shell: pwsh
        run: |
          $exe = "build\dist\OpenZenLoader.exe"
          if (-not (Test-Path $exe)) { throw "missing $exe" }
          $sz = (Get-Item $exe).Length
          Write-Host ("OpenZenLoader.exe: {0:N0} bytes ({1:N2} MB)" -f $sz, ($sz/1MB))

      - name: Upload OpenZenLoader.exe
        uses: actions/upload-artifact@v4
        with:
          name: OpenZenLoader-${{ steps.rev.outputs.sha }}
          path: build/dist/OpenZenLoader.exe
          if-no-files-found: error
          retention-days: 30
